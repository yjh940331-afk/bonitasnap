backend:
  name: github
  repo: yjh940331-afk/bonitasnap
  branch: main
  base_url: https://sveltia-cms-auth.yjh940331.workers.dev

# 업로드한 사진이 저장되는 폴더 (Git 기본 미디어 라이브러리 - 기존 사진 호환용)
media_folder: "images/uploads"
public_folder: "/images/uploads"

# 사진 저장소: Cloudflare R2 (대용량 원본 업로드용)
# - 비밀키(Secret Access Key)는 여기 넣지 않음. 관리자에서 사진 처음 올릴 때 1회 입력 → 브라우저에 안전 저장.
media_libraries:
  cloudflare_r2:
    account_id: b8c01aa804c1c42982b17864b74e975b
    bucket: bonitasnap-images
    access_key_id: 5db68e1d66ee478e2da9b33d8e162f6b
    public_url: https://media.bonitasnap.com
    prefix: uploads/

# 편집 화면 언어/문구
locale: "ko"
publish_mode: simple
site_url: https://bonitasnap.com
display_url: https://bonitasnap.com

collections:
  - name: "settings"
    label: "보니타스냅 관리"
    delete: false
    editor:
      preview: false
    files:
      - name: "site"
        label: "홈페이지 전체 편집"
        file: "content/settings.json"
        description: "사진·문구·가격·후기·Q&A를 관리합니다. 저장 후 우측 상단 Publish를 누르면 사이트에 반영됩니다."
        fields:
          # ---------- 기본 정보 ----------
          - { label: "브랜드명", name: "brand", widget: "string", hint: "사이트 곳곳에 표시되는 이름" }
          - { label: "카카오톡 채널 주소", name: "kakao", widget: "string", required: false }

          # ---------- 하단 업체 정보 ----------
          - label: "하단 업체 정보(푸터)"
            name: "company"
            widget: "object"
            fields:
              - { label: "업체명", name: "name", widget: "string", required: false, default: "보니따 스냅 (Bonita Snap)" }
              - { label: "대표", name: "owner", widget: "string", required: false, default: "박아름" }
              - { label: "사업자번호", name: "bizNumber", widget: "string", required: false, default: "707-17-02276" }
              - { label: "이메일", name: "email", widget: "string", required: false, default: "on_o_ff_@naver.com" }
              - { label: "인스타그램 주소", name: "instagram", widget: "string", required: false, hint: "예: https://www.instagram.com/아이디" }

          # ---------- 메인(첫 화면) ----------
          - label: "메인 첫 화면"
            name: "hero"
            widget: "object"
            fields:
              - { label: "배경 사진", name: "image", widget: "image", required: false }

          # ---------- 소개 ----------
          - label: "소개(About)"
            name: "about"
            widget: "object"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "소개 글", name: "body", widget: "text", hint: "줄바꿈으로 문장을 나눠 주세요." }

          # ---------- 대표 작가 ----------
          - label: "대표 작가 소개"
            name: "photographer"
            widget: "object"
            fields:
              - { label: "섹션 제목", name: "title", widget: "string", default: "대표 작가 박아름" }
              - { label: "작가 이름", name: "name", widget: "string", default: "박아름" }
              - { label: "역할/직함", name: "role", widget: "string", default: "Bonita Snap 대표 작가" }
              - { label: "프로필 사진", name: "image", widget: "image", required: false, hint: "대표 작가님 얼굴이 나온 프로필 사진을 올려주세요." }
              - { label: "누적 촬영 수", name: "shootCount", widget: "string", default: "100건+" }
              - { label: "촬영 철학", name: "body", widget: "text", hint: "줄바꿈으로 문장을 나눠 주세요." }
              - { label: "직접 촬영 안내 문구", name: "promise", widget: "string", default: "모든 촬영은 대표 작가가 직접 진행합니다. 알바·외주 촬영 없이 책임 있게 함께합니다." }

          # ---------- 신뢰 배지 ----------
          - label: "신뢰 포인트(Why Bonita)"
            name: "trustBadges"
            widget: "list"
            label_singular: "신뢰 포인트"
            summary: "{{fields.title}}"
            fields:
              - { label: "아이콘 짧은 글자", name: "icon", widget: "string", hint: "예: ID, PRO, RAW, DOC" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "text", widget: "string" }

          # ---------- 포트폴리오 ----------
          - label: "포트폴리오 앨범"
            name: "portfolioAlbums"
            widget: "list"
            label_singular: "앨범"
            summary: "{{fields.title}} · {{fields.category}}"
            hint: "예식장이나 촬영 건별로 앨범을 만들고, 그 안에 사진을 여러 장 넣어주세요. 사이트에는 앨범 대표 사진만 먼저 보이고, 클릭하면 앨범 안 사진을 넘겨볼 수 있습니다."
            fields:
              - { label: "예식장 이름(사진 위에 표시)", name: "title", widget: "string", required: false, hint: "예: 남산뜰, 엘리에나호텔. 비워두면 분류명(밝은홀 등)이 표시됩니다." }
              - { label: "대표 사진(목록에 보이는 사진)", name: "cover", widget: "image", required: false, hint: "비워두면 앨범 안 첫 번째 사진이 대표 사진으로 보입니다." }
              - { label: "짧은 설명", name: "description", widget: "string", required: false, default: "" }
              - label: "분류"
                name: "category"
                widget: "select"
                options:
                  - { label: "밝은홀", value: "brightHall" }
                  - { label: "어두운홀", value: "darkHall" }
                  - { label: "야외예식", value: "outdoorWedding" }
              - label: "앨범 안 사진·영상"
                name: "images"
                widget: "list"
                label_singular: "사진"
                summary: "{{fields.caption}}"
                fields:
                  - { label: "사진", name: "image", widget: "image", required: false }
                  - { label: "유튜브 영상 ID(영상일 때만)", name: "youtube", widget: "string", required: false, default: "" }
                  - { label: "사진 설명(선택)", name: "caption", widget: "string", required: false, default: "" }

          # ---------- 가격 ----------
          - label: "촬영 상품(가격)"
            name: "products"
            widget: "list"
            label_singular: "상품"
            summary: "{{fields.name}} · {{fields.price}}"
            fields:
              - { label: "상품명(영문, 예: Basic)", name: "name", widget: "string" }
              - { label: "선택 버튼 이름(예: 베이직)", name: "label", widget: "string", required: false }
              - { label: "설명", name: "desc", widget: "string", required: false }
              - { label: "가격", name: "price", widget: "string" }
              - label: "구성(섹션 — 표 또는 본문)"
                name: "sections"
                widget: "list"
                label_singular: "섹션"
                summary: "{{fields.title}}"
                hint: "위에서부터 순서대로 화면에 표시됩니다. '표'는 왼쪽 항목·오른쪽 내용의 표, '본문'은 줄글로 나옵니다."
                fields:
                  - label: "종류"
                    name: "type"
                    widget: "select"
                    default: "table"
                    options:
                      - { label: "표", value: "table" }
                      - { label: "본문(줄글)", value: "text" }
                  - { label: "제목(표 상단 안내문 / 본문 소제목)", name: "title", widget: "string", required: false }
                  - label: "표 내용 (종류가 '표'일 때만)"
                    name: "rows"
                    widget: "list"
                    required: false
                    label_singular: "행"
                    summary: "{{fields.category}}"
                    fields:
                      - { label: "왼쪽 항목명", name: "category", widget: "string" }
                      - { label: "오른쪽 내용", name: "content", widget: "text", hint: "빈 줄(엔터 2번)로 항목을 나눕니다. 한 항목 안에서 줄바꿈은 엔터 1번." }
                  - { label: "본문 글 (종류가 '본문'일 때만)", name: "body", widget: "text", required: false, hint: "빈 줄(엔터 2번)로 문단을 나눕니다. 문단 안 줄바꿈은 엔터 1번." }

          # ---------- 예약 절차 ----------
          - label: "예약 절차"
            name: "process"
            widget: "list"
            label_singular: "단계"
            summary: "{{fields.title}}"
            fields:
              - { label: "단계 제목", name: "title", widget: "string" }
              - { label: "설명", name: "desc", widget: "string", required: false }

          # ---------- 예약 가능 일정 ----------
          - label: "예약 가능 일정"
            name: "availability"
            widget: "object"
            fields:
              - { label: "제목", name: "title", widget: "string", default: "예약 가능 일정" }
              - { label: "현재 예약 현황", name: "status", widget: "string", default: "2026년 전체, 2027년 상반기 예약 상담 중" }
              - { label: "안내 문구", name: "note", widget: "string", required: false }
              - label: "상세 안내"
                name: "items"
                widget: "list"
                field: { label: "안내", name: "item", widget: "string" }

          # ---------- 제휴 ----------
          - label: "제휴(Partners)"
            name: "partners"
            widget: "object"
            fields:
              - { label: "제목", name: "title", widget: "string", default: "함께 만드는 웨딩" }
              - { label: "소개 문구", name: "lead", widget: "string", required: false }
              - { label: "버튼 문구", name: "ctaText", widget: "string", default: "제휴 문의하기" }
              - { label: "버튼 링크", name: "ctaUrl", widget: "string", required: false }
              - label: "제휴처/제휴 분야"
                name: "items"
                widget: "list"
                label_singular: "제휴 항목"
                summary: "{{fields.name}}"
                fields:
                  - { label: "로고 이미지", name: "logo", widget: "image", required: false }
                  - { label: "로고 없을 때 표시할 글자", name: "initial", widget: "string", required: false, hint: "예: H, P, D" }
                  - { label: "이름", name: "name", widget: "string" }
                  - { label: "분류/설명", name: "category", widget: "string", required: false }

          # ---------- Q&A ----------
          - label: "자주 묻는 질문(Q&A)"
            name: "faq"
            widget: "list"
            label_singular: "질문"
            summary: "{{fields.q}}"
            fields:
              - { label: "질문", name: "q", widget: "string" }
              - { label: "답변", name: "a", widget: "text" }

          # ---------- 예약 문의 안내 ----------
          - label: "예약 문의 안내"
            name: "booking"
            widget: "object"
            fields:
              - { label: "폼 위 안내 문구", name: "note", widget: "string", required: false }
