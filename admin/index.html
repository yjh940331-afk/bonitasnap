<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>보니타스냅 관리자</title>
  <link rel="stylesheet" href="/admin/admin.css" />
  <script>window.CMS_MANUAL_INIT = true;</script>
</head>
<body>
  <main class="admin-home" id="adminWelcome">
    <header class="admin-topbar" aria-label="관리자 상단">
      <a class="brand-lockup" href="/" target="_blank" rel="noopener">
        <span class="brand-mark">B</span>
        <span>
          <strong>BONITA SNAP</strong>
          <small>관리자</small>
        </span>
      </a>
      <div class="admin-status" aria-label="서비스 상태">
        <span>Identity 연결</span>
        <span>Git Gateway 연결</span>
      </div>
    </header>

    <section class="admin-workspace" aria-labelledby="adminTitle">
      <div class="admin-copy">
        <p class="eyebrow">Bonita Snap CMS</p>
        <h1 id="adminTitle">홈페이지 내용을 관리합니다</h1>
        <p class="lead">사진, 문구, 가격, 후기까지 한 곳에서 정리하고 게시합니다.</p>

        <div class="admin-actions">
          <button class="primary-action" type="button" id="openCms">
            콘텐츠 편집 시작
          </button>
          <a class="ghost-action" href="/" target="_blank" rel="noopener">사이트 보기</a>
        </div>
      </div>

      <figure class="admin-photo" aria-label="보니타스냅 사진 미리보기">
        <img src="/images/uploads/photo-2.jpg" alt="" />
        <figcaption>
          <span>Live site</span>
          <strong>bonitasnap.com</strong>
        </figcaption>
      </figure>
    </section>

    <section class="admin-quick" aria-label="관리 항목">
      <article>
        <span class="step">01</span>
        <h2>사진</h2>
        <p>포트폴리오와 대표 이미지를 관리합니다.</p>
      </article>
      <article>
        <span class="step">02</span>
        <h2>문구</h2>
        <p>소개글, 예약 안내, 자주 묻는 질문을 정리합니다.</p>
      </article>
      <article>
        <span class="step">03</span>
        <h2>게시</h2>
        <p>Publish 후 새 배포가 완료되면 사이트에 반영됩니다.</p>
      </article>
    </section>
  </main>

  <div class="cms-loading" id="cmsLoading" hidden>
    <div>
      <span class="brand-mark">B</span>
      <p>편집기를 여는 중입니다</p>
    </div>
  </div>

  <!-- Netlify Identity (이메일/비밀번호 로그인) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Decap CMS (콘텐츠 편집 UI) -->
  <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>
  <script src="/admin/admin.js"></script>
</body>
</html>
